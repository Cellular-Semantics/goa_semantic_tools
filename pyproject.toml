[tool.uv.workspace]
members = [
    "src/goa_semantic_tools",
    "src/goa_semantic_tools_validation_tools",
]

[tool.uv]
managed = true
dev-dependencies = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "ruff>=0.5.0",
    "mypy>=1.10.0",
    "sphinx>=7.3.0",
    "sphinx-autodoc-typehints>=1.25.0",
    "myst-parser>=2.0.0",
    "pre-commit>=3.7.0",
    "ipython>=9.10.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-m 'unit'"
markers = [
    "unit: fast, isolated tests",
    "integration: real API and IO tests",
]

[tool.ruff]
src = ["src", "tests"]
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
packages = ["goa_semantic_tools", "goa_semantic_tools_validation_tools"]
python_version = "3.14"
disallow_untyped_defs = true
strict_optional = true
warn_unused_ignores = true

[tool.coverage.run]
source = [
    "src/goa_semantic_tools",
    "src/goa_semantic_tools_validation_tools",
]
omit = [
    # Unused scaffold code (from template, not used in Ring 0)
    "*/agents/*",
    "*/graphs/*",
    "*/schemas/*",
    "*/validation/*",
    # Legacy service (replaced by go_markdown_explanation_service)
    "*/services/go_explanation_service.py",
]
